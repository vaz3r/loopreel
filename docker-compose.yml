services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: loopreel
      POSTGRES_PASSWORD: loopreel
      POSTGRES_DB: loopreel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loopreel -d loopreel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  faster-whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    ports:
      - "8000:8000"
    environment:
      ASR_MODEL: base
      ASR_ENGINE: openai_whisper

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://loopreel:loopreel@postgres:5432/loopreel
      REDIS_URL: redis://redis:6379
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-openrouter/free}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-loopreel}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-ingest:
    build:
      context: .
      dockerfile: apps/worker-ingest/Dockerfile
    environment:
      DATABASE_URL: postgresql://loopreel:loopreel@postgres:5432/loopreel
      REDIS_URL: redis://redis:6379
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-loopreel}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-transcribe:
    build:
      context: .
      dockerfile: apps/worker-transcribe/Dockerfile
    environment:
      DATABASE_URL: postgresql://loopreel:loopreel@postgres:5432/loopreel
      REDIS_URL: redis://redis:6379
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-loopreel}
      WHISPER_URL: http://faster-whisper:8000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      faster-whisper:
        condition: service_started

  worker-structure:
    build:
      context: .
      dockerfile: apps/worker-structure/Dockerfile
    environment:
      DATABASE_URL: postgresql://loopreel:loopreel@postgres:5432/loopreel
      REDIS_URL: redis://redis:6379
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-openrouter/free}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-60000}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-3}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-render:
    build:
      context: .
      dockerfile: apps/worker-render/Dockerfile
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql://loopreel:loopreel@postgres:5432/loopreel
      REDIS_URL: redis://redis:6379
      API_URL: http://api:3000
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-loopreel}
      PLAYWRIGHT_POOL_SIZE: ${PLAYWRIGHT_POOL_SIZE:-5}
      METRICS_PORT: ${METRICS_PORT:-8004}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
